name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: "package.json"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Lint files
        run: npm run lint
